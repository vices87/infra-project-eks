apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapp-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'git@github.com:seu-usuario/seu-repo.git'
    targetRevision: main
    path: manifests/dev
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: myapp-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

