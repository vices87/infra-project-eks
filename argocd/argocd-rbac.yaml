# ============================================================
# 1. CLUSTERROLE — permissões no escopo do cluster inteiro
# ============================================================

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: readonly
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "endpoints", "namespaces", "nodes"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: developer
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets", "replicasets"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ops
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets",
              "persistentvolumeclaims", "serviceaccounts"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses", "networkpolicies"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["autoscaling"]
  resources: ["horizontalpodautoscalers"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
# ============================================================
# 2. CLUSTERROLEBINDING — vincula ClusterRole a subjects
#    no escopo do cluster inteiro
#
#    No caso AWS sem Azure AD, o subject vem do Access Entry:
#
#    access_entries = {
#      ops = {
#        principal_arn     = "arn:aws:iam::123456789:role/ops-role"
#        kubernetes_groups = ["ops"]   ← esse é o name abaixo
#      }
#    }
# ============================================================

# Vinculando por Group (recomendado — vem do kubernetes_groups do Access Entry)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ops-binding
subjects:
- kind: Group
  name: ops                         # kubernetes_groups do Access Entry
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: ops
  apiGroup: rbac.authorization.k8s.io

---
# Vinculando por User (vem do username do Access Entry)
#
#    access_entries = {
#      sre = {
#        principal_arn = "arn:aws:iam::123456789:role/sre-role"
#        username      = "sre-user"   ← esse é o name abaixo
#      }
#    }
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sre-readonly
subjects:
- kind: User
  name: sre-user                    # username do Access Entry
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: readonly
  apiGroup: rbac.authorization.k8s.io

---
# Vinculando por ServiceAccount (para workloads, não humanos)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-admin
subjects:
- kind: ServiceAccount
  name: argocd                      # nome da ServiceAccount
  namespace: argocd                 # namespace onde a SA foi criada
roleRef:
  kind: ClusterRole
  name: cluster-admin               # builtin do Kubernetes
  apiGroup: rbac.authorization.k8s.io

---
# ============================================================
# 3. ROLE — permissões restritas a um namespace específico
# ============================================================

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: developer
  namespace: dev
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets", "replicasets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch", "create", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: readonly
  namespace: prod
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["get", "list", "watch"]

---
# ============================================================
# 4. ROLEBINDING — vincula Role ou ClusterRole a subjects
#    mas restrito a um namespace
# ============================================================

# Group + Role (escopo namespace)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devs-developer
  namespace: dev
subjects:
- kind: Group
  name: devs                        # kubernetes_groups do Access Entry
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role                        # Role local do namespace
  name: developer
  apiGroup: rbac.authorization.k8s.io

---
# Group + ClusterRole via RoleBinding (reutiliza ClusterRole mas restringe ao namespace)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devs-readonly-prod
  namespace: prod
subjects:
- kind: Group
  name: devs
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole                 # reusa ClusterRole mas só nesse namespace
  name: readonly
  apiGroup: rbac.authorization.k8s.io

---
# User + Role (escopo namespace)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-user-staging
  namespace: staging
subjects:
- kind: User
  name: dev-user                    # username do Access Entry
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: developer
  apiGroup: rbac.authorization.k8s.io

---
# ServiceAccount + Role (escopo namespace — comum para workloads)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-sa-binding
  namespace: dev
subjects:
- kind: ServiceAccount
  name: minha-app                   # ServiceAccount da aplicação
  namespace: dev
roleRef:
  kind: Role
  name: developer
  apiGroup: rbac.authorization.k8s.io

---
# ============================================================
# 5. SERVICEACCOUNT — identidade para workloads
# ============================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: minha-app
  namespace: dev
  annotations:
    # IRSA — permite que a SA assuma uma IAM Role via OIDC
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789:role/minha-app-role"

