name: Terraform CI/CD

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      directory:
        description: "Diretório (ex: system-a/dev/eks)"
        required: true
        type: string
      action:
        description: "Ação"
        required: true
        type: choice
        options:
          - plan
          - apply

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:

  # Roda plan em todo system-a/dev em cada PR
  plan:
    name: Plan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/infra-runner:latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Plan
        run: terragrunt run-all plan --terragrunt-working-dir system-a/dev 2>&1

  # Apply manual num diretório específico
  apply:
    name: "${{ github.event.inputs.action }}: ${{ github.event.inputs.directory }}"
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/infra-runner:latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Run
        run: |
          ACTION="${{ github.event.inputs.action }}"
          APPROVE=$( [ "$ACTION" = "apply" ] && echo "--auto-approve" )
          terragrunt $ACTION $APPROVE --terragrunt-working-dir "${{ github.event.inputs.directory }}"
