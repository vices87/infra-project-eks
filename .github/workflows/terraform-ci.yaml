

name: Terraform CI


on: 
  workflow_dispatch:
    
# on:
#   pull_request:
#   push:
#     branches:
#       - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    # usa a imagem criada no workflow build-runner
    container:
      image: ghcr.io/${{ github.repository }}/infra-runner:latest

    permissions:
      contents: read
      id-token: write

    steps:

      # baixa o repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # # autenticação AWS via OIDC
      # - name: Configure AWS Credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     role-to-assume: arn:aws:iam::123456789012:role/github-actions-role
      #     aws-region: us-east-1

      # # inicializa terraform/terragrunt
      # - name: Terragrunt Init
      #   run: terragrunt run-all init

      - name: Terraform init
        run: terraform init -backend=false

      # checa formatação
      - name: Terraform Format
        run: terraform fmt -check -recursive || true

      # valida código terraform
      - name: Terraform Validate
        run: terraform validate

      # inicializa regras do tflint
      - name: TFLint Init
        run: tflint --init

      # lint terraform
      - name: TFLint Scan
        run: tflint scan system-a

      # security scan tfsec
      - name: tfsec scan
        run: tfsec .

      # # plan em pull requests
      # - name: Terragrunt Plan
      #   if: github.event_name == 'pull_request'
      #   run: terragrunt run-all plan

      # # apply apenas na main
      # - name: Terragrunt Apply
      #   if: github.ref == 'refs/heads/main'
      #   run: terragrunt run-all apply -auto-approve